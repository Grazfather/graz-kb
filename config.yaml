# https://ergogen.cache.works/
meta:
  version: 0.1.0
units:
  # Choc spacing
  kx: cx
  ky: cy
  # Padding Variables
  px: kx + 4
  py: ky + 4
  led_pos_x: 0 # Led X position relative to the switch center
  led_pos_y: 4.7 # Led Y position relative to the switch center
  kcow: 13.8 # key cutout hole width (cherry, choc v2: 14, choc v1: 13.8)
  kcoh: 13.8 # key cutout hole height (cherry, choc v2: 14, choc v1: 13.8)
  keycw: 17.5 # keycap width (cherry: 18, choc: 17.5)
  keych: 16.5 # keycap height (cherry: 18, choc: 16.5)
  vertical_diode_shift: 1.5 # How much to shift to avoid overlap
  horizontal_diode_shift: -0.5 kcow - 0.85
  diode_rotation: -180 # Diode rotation
  switch_rotation: 180 # Hotswap south, led north
  # For preview only. We show slightly smaller to ID overlaps
  $default_width: cx-1
  $default_height: cy-1
points:
  rotate: -20
  key:
    padding: ky
    spread: kx
    tags:
      1u: true
        # What is this?
    # footprints:
    #   choc_hotswap:
    #     type: choc
    #     params:
    #       hotswap: true
    #       reverse: true
    #       keycaps: true

  zones:
    matrix:
      # Fix placement on KiCAD sheet
      anchor:
        shift: [100, -100]
      columns:
        outer:
          rows:
            mod.skip: true
            bottom.key:
              led_prev: LED_4
              led_next: LED_5
            home.key:
              led_prev: LED_3
              led_next: LED_4
            top.key:
              led_prev: LED_2
              led_next: LED_3
            num.key:
              led_prev: LED_1
              led_next: LED_2
          key:
            column_net: col_outer
        pinky:
          rows:
            mod.skip: true
            bottom.key:
              led_prev: LED_6
              led_next: LED_7
            home.key:
              led_prev: LED_7
              led_next: LED_8
            top.key:
              led_prev: LED_8
              led_next: LED_9
            num.key:
              led_prev: LED_9
              led_next: LED_10
          key:
            stagger: 3
            column_net: col_pinky
        ring:
          key:
            stagger: 3
            column_net: col_ring
          rows:
            mod.column_net: col_pinky
            mod.key:
              led_prev: LED_5
              led_next: LED_6
            bottom.key:
              led_prev: LED_13
              led_next: LED_14
            home.key:
              led_prev: LED_12
              led_next: LED_13
            top.key:
              led_prev: LED_11
              led_next: LED_12
            num.key:
              led_prev: LED_10
              led_next: LED_11
        middle:
          key:
            stagger: 3
            column_net: col_middle
          rows:
            mod.column_net: col_ring
            mod.key:
              led_prev: LED_14
              led_next: LED_15
            bottom.key:
              led_prev: LED_16
              led_next: LED_17
            home.key:
              led_prev: LED_17
              led_next: LED_18
            top.key:
              led_prev: LED_18
              led_next: LED_19
            num.key:
              led_prev: LED_19
              led_next: LED_20
        index:
          key:
            stagger: -4
            column_net: col_index
          rows:
            mod.column_net: col_middle
            mod.key:
              led_prev: LED_15
              led_next: LED_16
            bottom.key:
              led_prev: LED_23
              led_next: LED_24
            home.key:
              led_prev: LED_22
              led_next: LED_23
            top.key:
              led_prev: LED_21
              led_next: LED_22
            num.key:
              led_prev: LED_20
              led_next: LED_21
        inner:
          rows:
            mod.skip: true
            bottom.key:
              led_prev: LED_26
              led_next: LED_27
            home.key:
              led_prev: LED_27
              led_next: LED_28
            top.key:
              led_prev: LED_28
              led_next: LED_29
            num.key:
              led_prev: LED_29
              led_next: LED_30
          key:
            stagger: -2
            column_net: col_inner
      rows:
        mod:
          row_net: row_mod
          mirror.row_net: mirror_row_mod
        bottom:
          row_net: row_bottom
          mirror.row_net: mirror_row_bottom
        home:
          row_net: row_home
          mirror.row_net: mirror_row_home
        top:
          row_net: row_top
          mirror.row_net: mirror_row_top
        num:
          row_net: row_num
          mirror.row_net: mirror_row_num
    thumbfan:
      anchor:
        ref: matrix_inner_mod
        shift: [2, 8]
      columns:
        home:
          rows.thumb.key:
            led_prev: LED_24
            led_next: LED_25
          key:
            spread: 4+kx
            splay: -35
            origin: [-20.75, -19]
            column_net: col_index
            mirror.column_net: col_index
        far:
          rows.thumb.key:
            led_prev: LED_25
            led_next: LED_26
          key:
            spread: 21
            splay: -5
            origin: [-9.5, -9]
            column_net: col_inner
            mirror.column_net: col_inner
      rows:
        thumb:
          row_net: row_mod
          mirror.row_net: mirror_row_mod
  mirror:
    ref: matrix_inner_home
    distance: cx+60
outlines:
  raw:
    - what: rectangle
      where: true
      size: [2px, 2py]
      fillet: 4
  keys:
    - what: rectangle
      where: true
      bound: false
      #size: [kx - 0.5, ky - 0.5]
      #size: [kx, ky]
      size: [13.80, 13.80]
  board:
    - what: polygon
      operation: stack
      points:
        - ref: thumbfan_far_thumb
          shift: [0.55px,-0.55py]
        - ref: matrix_index_mod
          shift: [0.5px, -0.65py]
        - ref: matrix_ring_mod
          shift: [-0.5px, -0.6py]
        - ref: matrix_outer_bottom
          shift: [-0.55px, -0.55py]
        - ref: matrix_outer_num
          shift: [-0.55px, 0.55py]
        - ref: matrix_middle_num
          shift: [-0.5px, 0.65py]
        - ref: matrix_inner_num
          shift: [0.5px, 0.65py]

        - ref: mirror_matrix_inner_num
          shift: [0.5px, 0.65py]
        - ref: mirror_matrix_middle_num
          shift: [-0.5px, 0.65py]
        - ref: mirror_matrix_outer_num
          shift: [-0.55px, 0.55py]
        - ref: mirror_matrix_outer_bottom
          shift: [-0.55px, -0.55py]
        - ref: mirror_matrix_ring_mod
          shift: [-0.5px, -0.6py]
        - ref: mirror_matrix_index_mod
          shift: [0.5px, -0.65py]
        - ref: mirror_thumbfan_far_thumb
          shift: [0.55px,-0.55py]
      fillet: 5
  combo:
    - name: board
    - operation: subtract
      name: keys
pcbs:
  keyboard:
    outlines:
      main:
        outline: board
    footprints:
      key_switches:
        what: ceoloide/switch_choc_v1_v2
        where: true
        params:
          hotswap: true
          reversible: false
          side: B
          from: "{{column_net}}"
          to: "{{colrow}}"
          choc_v2_support: false
          show_keycaps: true
          keycaps_x: keycw
          keycaps_y: keych
        adjust:
          rotate: switch_rotation
      diode:
        what: ceoloide/diode_tht_sod123
        where: true
        params:
          from: "{{colrow}}"
          to: "{{row_net}}"
          include_tht: false
          reversible: false
          side: B
          # Don't mirror
        adjust:
          shift: [horizontal_diode_shift,vertical_diode_shift]
          rotate: 90 + diode_rotation
          resist: true
      mcu:
        what: grazfather/waveshare_rp2040_zero
        params:
          P0: OLED_MOSI
          P1: OLED_SS
          P2: OLED_SCK
          P3: mirror_row_num
          P4: mirror_row_top
          P5: mirror_row_home
          P6: mirror_row_bottom
          P7: mirror_row_mod
          P8: col_inner
          P9: col_index
          P10: col_middle
          P11: col_ring
          P12: col_pinky
          P13: col_outer
          P14: row_mod
          P15: row_bottom
          P26: row_home
          P27: row_top
          P28: row_num
          P29: LED_1
        where:
          ref.aggregate.parts: [matrix_inner_top, mirror_matrix_inner_top]
          # rotate: -90
          shift: [0, 12]
      oled:
        what: ceoloide/nice_view
        params:
          VCC: VCC3V3
          MOSI: OLED_MOSI
          CS: OLED_SS
          SCK: OLED_SCK
        where:
          ref.aggregate.parts: [matrix_inner_top, mirror_matrix_inner_top]
          shift: [0,6]
      per_key_leds:
        what: ceoloide/led_sk6812mini-e
        where: true
        params:
          side: B
          reverse_mount: true
          P1: VCC3V3
          P2: "{{key.led_next}}" # DOUT
          P3: GND
          P4: "{{key.led_prev}}" # DIN
        adjust:
          shift: [led_pos_x, led_pos_y]
      holeTopLeft:
        what: mountinghole
        where:
          ref: [matrix_outer_num]
          shift: [0.5kx, -0.3ky]
      holeBottomLeft:
        what: mountinghole
        where:
          ref: [matrix_outer_bottom]
          shift: [0.5kx, -0.65ky]
      holeTopInnerLeft:
        what: mountinghole
        where:
          ref: [matrix_inner_num]
          shift: [0.75kx, -0.5ky]
      holeBottomInnerLeft:
        what: mountinghole
        where:
          ref: [matrix_index_mod]
          shift: [0.65kx, -0.35ky]
      holeTopRight:
        what: mountinghole
        where:
          ref: [mirror_matrix_outer_num]
          shift: [0.5kx, -0.3ky]
      holeBottomRight:
        what: mountinghole
        where:
          ref: [mirror_matrix_outer_bottom]
          shift: [0.5kx, -0.65ky]
      holeTopInnerRight:
        what: mountinghole
        where:
          ref: [mirror_matrix_inner_num]
          shift: [0.75kx, -0.5ky]
      holeBottomInnerRight:
        what: mountinghole
        where:
          ref: [mirror_matrix_index_mod]
          shift: [0.65kx, -0.35ky]
